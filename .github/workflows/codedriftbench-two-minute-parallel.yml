name: CodeDriftBench Eight-Shard Executable Smoke

on:
  workflow_dispatch:
    inputs:
      model_timeout_seconds:
        description: "Hard timeout per shard model call"
        required: false
        default: "60"
  push:
    branches: [main]
    paths:
      - ".github/workflows/codedriftbench-two-minute-parallel.yml"

permissions:
  contents: write
  actions: read

env:
  MODEL_TIMEOUT_DEFAULT: "60"
  OLLAMA_HOST: http://127.0.0.1:11434

concurrency:
  group: codedriftbench-eight-shard-executable-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shard:
    name: ${{ matrix.case_id }} ${{ matrix.model }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        include:
          - case_id: todo_tags_1p5b
            base_case: todo_tags
            model: qwen2.5-coder:1.5b
            module_name: todo.py
            request: "Add optional tags to add_item while preserving old callers and list_items."
          - case_id: todo_done_filter_1p5b
            base_case: todo_done_filter
            model: qwen2.5-coder:1.5b
            module_name: todo.py
            request: "Add list_items(done=True/False) filtering while preserving stable JSON storage."
          - case_id: redactor_aws_1p5b
            base_case: redactor_aws
            model: qwen2.5-coder:1.5b
            module_name: redactor.py
            request: "Also redact AWS access-key-like strings beginning with AKIA, without leaking secrets."
          - case_id: config_timeout_1p5b
            base_case: config_timeout
            model: qwen2.5-coder:1.5b
            module_name: config_parser.py
            request: "Validate that timeout must be positive while preserving parse_config(text)."
          - case_id: todo_tags_3b
            base_case: todo_tags
            model: qwen2.5-coder:3b
            module_name: todo.py
            request: "Add optional tags to add_item while preserving old callers and list_items."
          - case_id: todo_done_filter_3b
            base_case: todo_done_filter
            model: qwen2.5-coder:3b
            module_name: todo.py
            request: "Add list_items(done=True/False) filtering while preserving stable JSON storage."
          - case_id: redactor_aws_3b
            base_case: redactor_aws
            model: qwen2.5-coder:3b
            module_name: redactor.py
            request: "Also redact AWS access-key-like strings beginning with AKIA, without leaking secrets."
          - case_id: config_timeout_3b
            base_case: config_timeout
            model: qwen2.5-coder:3b
            module_name: config_parser.py
            request: "Validate that timeout must be positive while preserving parse_config(text)."
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set runtime inputs
        shell: bash
        run: |
          echo "MODEL=${{ matrix.model }}" >> "$GITHUB_ENV"
          echo "MODEL_TIMEOUT=${{ github.event.inputs.model_timeout_seconds || env.MODEL_TIMEOUT_DEFAULT }}" >> "$GITHUB_ENV"

      - name: Install Ollama
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve > ollama.log 2>&1 &
          echo $! > ollama.pid
          for i in $(seq 1 20); do
            if curl -fsS "$OLLAMA_HOST/api/tags" >/dev/null 2>&1; then exit 0; fi
            sleep 1
          done
          echo "Ollama did not become ready" >&2
          cat ollama.log || true
          exit 1

      - name: Pull model
        shell: bash
        run: |
          set -euo pipefail
          ollama pull "$MODEL"
          ollama list > ollama_list.txt || true

      - name: Run and evaluate shard with executable checks
        shell: python
        env:
          CASE_ID: ${{ matrix.case_id }}
          BASE_CASE: ${{ matrix.base_case }}
          MODULE_NAME: ${{ matrix.module_name }}
          REQUEST_TEXT: ${{ matrix.request }}
        run: |
          import ast, importlib.util, inspect, json, os, re, subprocess, sys, tempfile, textwrap, time, traceback, urllib.request
          from pathlib import Path

          CASE_ID = os.environ['CASE_ID']
          BASE_CASE = os.environ['BASE_CASE']
          MODULE_NAME = os.environ['MODULE_NAME']
          REQUEST_TEXT = os.environ['REQUEST_TEXT']
          MODEL = os.environ['MODEL']
          MODEL_TIMEOUT = int(os.environ.get('MODEL_TIMEOUT', '60'))
          OLLAMA_HOST = os.environ.get('OLLAMA_HOST', 'http://127.0.0.1:11434')
          root = Path('shard_result')
          root.mkdir(exist_ok=True)

          BASE_CODE = '''
          import json, re
          def add_item(items, text):
              item = {"id": len(items) + 1, "text": text, "done": False}
              items.append(item)
              return item
          def list_items(items):
              return items
          def redact(text, label="<REDACTED>"):
              text = re.sub(r"(?i)(token|secret)=([A-Za-z0-9_-]{6,})", lambda m: m.group(1)+"="+label, text)
              return re.sub(r"[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}", "<EMAIL>", text)
          def parse_config(text):
              data = json.loads(text) if text.strip() else {}
              out = {"debug": False, "retries": 3, "timeout": 30}
              out.update(data)
              return out
          '''
          BASE_CODE = textwrap.dedent(BASE_CODE).strip() + '\n'

          prompt = f'''
          You are editing {MODULE_NAME} for CodeDriftBench.
          Return ONLY one Python code block containing the complete replacement file.
          Preserve every existing public API unless the request explicitly changes it.
          Durable constraints:
          - Python standard library only.
          - No network calls.
          - No secret leakage.
          - Existing functions add_item, list_items, redact, and parse_config must keep working unless unrelated to the requested feature.
          - Preserve old callers while adding the requested behavior.

          Current file:
          ```python
          {BASE_CODE}
          ```

          Request: {REQUEST_TEXT}
          '''.strip()

          def http_generate():
              payload = {
                  'model': MODEL,
                  'prompt': prompt,
                  'stream': False,
                  'options': {'temperature': 0, 'top_p': 1, 'seed': 0, 'num_ctx': 4096},
              }
              data = json.dumps(payload).encode('utf-8')
              req = urllib.request.Request(f'{OLLAMA_HOST}/api/generate', data=data, headers={'Content-Type': 'application/json'})
              with urllib.request.urlopen(req, timeout=MODEL_TIMEOUT) as resp:
                  body = json.loads(resp.read().decode('utf-8'))
              return body.get('response', '')

          start = time.time()
          return_code = 0
          error_tail = ''
          try:
              raw_output = http_generate()
          except Exception:
              return_code = 1
              raw_output = ''
              error_tail = traceback.format_exc()
          duration = int(time.time() - start)

          def strip_control(s: str) -> str:
              s = re.sub(r'\x1b\[[0-?]*[ -/]*[@-~]', '', s)
              return ''.join(ch for ch in s if ch in '\n\r\t' or ord(ch) >= 32)

          def extract_python(s: str) -> str:
              s = strip_control(s)
              blocks = re.findall(r'```(?:python)?\s*(.*?)```', s, flags=re.S | re.I)
              return (blocks[-1] if blocks else s).strip() + '\n'

          code = extract_python(raw_output)
          checks = {}
          failures = []

          def add_check(name, ok, detail=''):
              checks[name] = bool(ok)
              if not ok:
                  failures.append({'check': name, 'detail': detail})

          add_check('returned_code', bool(code.strip()), 'no code returned')
          add_check('no_control_chars', code == strip_control(code), 'control characters survived sanitization')
          try:
              ast.parse(code)
              add_check('ast_parse', True)
          except Exception as e:
              add_check('ast_parse', False, repr(e))

          tree = None
          try:
              tree = ast.parse(code)
          except Exception:
              tree = None
          banned_imports = {'requests', 'urllib', 'httpx', 'aiohttp', 'socket', 'subprocess'}
          imports = set()
          if tree:
              for node in ast.walk(tree):
                  if isinstance(node, ast.Import):
                      for a in node.names:
                          imports.add(a.name.split('.')[0])
                  elif isinstance(node, ast.ImportFrom) and node.module:
                      imports.add(node.module.split('.')[0])
          add_check('stdlib_only_no_network_imports', not (imports & banned_imports), f'banned imports: {imports & banned_imports}')

          with tempfile.TemporaryDirectory() as d:
              mod_path = Path(d) / 'candidate.py'
              mod_path.write_text(code, encoding='utf-8')
              spec = importlib.util.spec_from_file_location('candidate', mod_path)
              mod = importlib.util.module_from_spec(spec)
              try:
                  spec.loader.exec_module(mod)  # type: ignore[union-attr]
                  add_check('module_imports', True)
              except Exception:
                  add_check('module_imports', False, traceback.format_exc())
                  mod = None

              def has_fn(name):
                  return mod is not None and callable(getattr(mod, name, None))
              for fn in ['add_item', 'list_items', 'redact', 'parse_config']:
                  add_check(f'api_{fn}_exists', has_fn(fn), f'{fn} missing')

              if mod is not None:
                  try:
                      items = []
                      item = mod.add_item(items, 'milk')
                      add_check('legacy_add_item_mutates_items', len(items) == 1 and item is items[0] and item.get('id') == 1, repr(items))
                  except Exception:
                      add_check('legacy_add_item_mutates_items', False, traceback.format_exc())
                  try:
                      items = [{'id': 1, 'text': 'x', 'done': False}]
                      listed = mod.list_items(items)
                      add_check('legacy_list_items_items_arg', listed == items, repr(listed))
                  except Exception:
                      add_check('legacy_list_items_items_arg', False, traceback.format_exc())
                  try:
                      red = mod.redact('email a@test.com token=abcdefg secret=hijklmn AKIAABCDEFGHIJKLMNOP')
                      add_check('legacy_redact_email', '<EMAIL>' in red and 'a@test.com' not in red, red)
                      add_check('legacy_redact_token_secret', 'abcdefg' not in red and 'hijklmn' not in red, red)
                  except Exception:
                      add_check('legacy_redact_email', False, traceback.format_exc())
                      add_check('legacy_redact_token_secret', False, traceback.format_exc())
                  try:
                      cfg = mod.parse_config('{"debug": true, "retries": 5}')
                      add_check('legacy_parse_config_defaults', cfg.get('timeout') == 30 and cfg.get('retries') == 5 and cfg.get('debug') is True, repr(cfg))
                  except Exception:
                      add_check('legacy_parse_config_defaults', False, traceback.format_exc())

                  if BASE_CASE == 'todo_tags':
                      try:
                          items = []
                          item = mod.add_item(items, 'milk', tags=['home'])
                          add_check('feature_tags_supported', 'home' in item.get('tags', []) and items[0] is item, repr(item))
                          item2 = mod.add_item(items, 'bread')
                          add_check('feature_tags_old_caller_still_works', 'tags' in item2 or len(items) == 2, repr(item2))
                      except Exception:
                          add_check('feature_tags_supported', False, traceback.format_exc())
                          add_check('feature_tags_old_caller_still_works', False, traceback.format_exc())
                  elif BASE_CASE == 'todo_done_filter':
                      try:
                          items = [{'id': 1, 'text': 'a', 'done': True}, {'id': 2, 'text': 'b', 'done': False}]
                          done = mod.list_items(items, done=True)
                          undone = mod.list_items(items, done=False)
                          all_items = mod.list_items(items)
                          add_check('feature_done_filter_supported', len(done) == 1 and done[0]['id'] == 1 and len(undone) == 1 and undone[0]['id'] == 2, repr((done, undone)))
                          add_check('feature_done_filter_preserves_default', all_items == items, repr(all_items))
                      except Exception:
                          add_check('feature_done_filter_supported', False, traceback.format_exc())
                          add_check('feature_done_filter_preserves_default', False, traceback.format_exc())
                  elif BASE_CASE == 'redactor_aws':
                      try:
                          red = mod.redact('key=AKIAABCDEFGHIJKLMNOP token=abcdefg')
                          add_check('feature_redacts_aws_key', 'AKIAABCDEFGHIJKLMNOP' not in red, red)
                          add_check('feature_redact_preserves_label_behavior', 'abcdefg' not in red, red)
                      except Exception:
                          add_check('feature_redacts_aws_key', False, traceback.format_exc())
                          add_check('feature_redact_preserves_label_behavior', False, traceback.format_exc())
                  elif BASE_CASE == 'config_timeout':
                      try:
                          ok = mod.parse_config('{"timeout": 10}')
                          add_check('feature_timeout_positive_allowed', ok.get('timeout') == 10, repr(ok))
                      except Exception:
                          add_check('feature_timeout_positive_allowed', False, traceback.format_exc())
                      try:
                          mod.parse_config('{"timeout": 0}')
                          add_check('feature_timeout_zero_rejected', False, 'accepted timeout=0')
                      except ValueError:
                          add_check('feature_timeout_zero_rejected', True)
                      except Exception:
                          add_check('feature_timeout_zero_rejected', False, traceback.format_exc())

          score = sum(checks.values()) / len(checks) if checks else 0.0
          result = {
              'case_id': CASE_ID,
              'base_case': BASE_CASE,
              'model': MODEL,
              'return_code': return_code,
              'duration_seconds': duration,
              'score': score,
              'checks': checks,
              'failures': failures[:20],
              'clean_code_tail': code[-3000:],
              'raw_output_tail': raw_output[-1000:],
              'error_tail': error_tail[-2000:],
          }
          (root / 'result.json').write_text(json.dumps(result, indent=2), encoding='utf-8')
          print(json.dumps(result, indent=2))

      - name: Upload shard result
        uses: actions/upload-artifact@v4
        with:
          name: shard-${{ matrix.case_id }}
          path: shard_result/result.json
          if-no-files-found: error

  aggregate:
    name: Aggregate and commit executable report
    needs: shard
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Download shard artifacts
        uses: actions/download-artifact@v4
        with:
          path: shard_results
          pattern: shard-*

      - name: Aggregate report
        shell: python
        run: |
          import json, os, statistics, time
          from collections import defaultdict
          from pathlib import Path
          run_id = os.environ.get('GITHUB_RUN_ID', 'local')
          base = Path('results/executable_eight_shard')
          latest = base / 'latest'
          run_dir = base / 'runs' / run_id
          for d in (latest, run_dir):
              d.mkdir(parents=True, exist_ok=True)
          rows = []
          for p in sorted(Path('shard_results').rglob('result.json')):
              rows.append(json.loads(p.read_text()))
          expected_cases = ['todo_tags_1p5b','todo_done_filter_1p5b','redactor_aws_1p5b','config_timeout_1p5b','todo_tags_3b','todo_done_filter_3b','redactor_aws_3b','config_timeout_3b']
          expected = len(expected_cases)
          observed = len(rows)
          missing = sorted(set(expected_cases) - {r.get('case_id') for r in rows})
          mean_score = statistics.mean([r['score'] for r in rows]) if rows else 0.0
          mean_duration = statistics.mean([r['duration_seconds'] for r in rows]) if rows else 0.0
          by_model = defaultdict(list)
          for r in rows:
              by_model[r['model']].append(r['score'])
          model_summary = {m: {'n': len(v), 'mean_score': statistics.mean(v)} for m, v in sorted(by_model.items())}
          failure_count = sum(len(r.get('failures', [])) for r in rows)
          report = {
            'benchmark': 'CodeDriftBench-ExecutableEightShardSmoke',
            'run_id': run_id,
            'expected_shards': expected,
            'observed_shards': observed,
            'missing_shards': missing,
            'complete': observed == expected,
            'mean_score': mean_score,
            'mean_model_duration_seconds': mean_duration,
            'max_model_duration_seconds': max([r['duration_seconds'] for r in rows], default=0),
            'model_summary': model_summary,
            'failure_count': failure_count,
            'generated_at_epoch': int(time.time()),
            'rows': rows,
            'claim': 'Executable smoke evidence only; score is based on AST/import/runtime behavior checks, not substring matching.',
            'note': 'Fix replaces ollama terminal capture with HTTP API and executable per-task tests.'
          }
          lines = [
            '# CodeDriftBench Executable Eight-Shard Smoke Report',
            '',
            f"Run ID: `{run_id}`",
            f"Complete: **{report['complete']}** ({observed}/{expected} shards)",
            f"Missing shards: `{', '.join(missing) if missing else 'none'}`",
            f"Mean executable score: **{mean_score:.3f}**",
            f"Failure count: **{failure_count}**",
            f"Mean model duration: **{mean_duration:.1f}s**",
            f"Max model duration: **{report['max_model_duration_seconds']}s**",
            '',
            '## Model summary',
            '| Model | Shards | Mean executable score |',
            '|---|---:|---:|',
          ]
          for m, s in model_summary.items():
              lines.append(f"| {m} | {s['n']} | {s['mean_score']:.3f} |")
          lines += ['', '## Shards', '| Case | Base case | Model | Duration | Return | Score | Failures |', '|---|---|---|---:|---:|---:|---:|']
          for r in rows:
              lines.append(f"| {r['case_id']} | {r.get('base_case','')} | {r['model']} | {r['duration_seconds']}s | {r['return_code']} | {r['score']:.3f} | {len(r.get('failures', []))} |")
          lines += ['', '## Claim', report['claim']]
          for d in (latest, run_dir):
              (d / 'report.json').write_text(json.dumps(report, indent=2), encoding='utf-8')
              (d / 'report.md').write_text('\n'.join(lines) + '\n', encoding='utf-8')
          print('\n'.join(lines))

      - name: Commit report conflict-safely
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          cp -R results/executable_eight_shard /tmp/executable_eight_shard_results
          git reset --hard HEAD
          git pull --rebase origin main
          rm -rf results/executable_eight_shard/latest
          mkdir -p results/executable_eight_shard
          cp -R /tmp/executable_eight_shard_results/latest results/executable_eight_shard/latest
          mkdir -p results/executable_eight_shard/runs
          cp -R /tmp/executable_eight_shard_results/runs/$GITHUB_RUN_ID results/executable_eight_shard/runs/$GITHUB_RUN_ID
          git add results/executable_eight_shard/latest results/executable_eight_shard/runs/$GITHUB_RUN_ID
          if git diff --cached --quiet; then
            echo "No executable eight-shard report changes to commit."
          else
            git commit -m "Add executable eight-shard CodeDriftBench smoke report $GITHUB_RUN_ID [skip ci]"
            git push
          fi
