name: Auto-run Short CodeDriftBench

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/codedriftbench-convergence.yml"
      - ".github/workflows/auto-run-short-benchmark.yml"

permissions:
  actions: write
  contents: write

concurrency:
  group: auto-run-codedriftbench-short-${{ github.ref }}
  cancel-in-progress: false

jobs:
  commit-probe:
    name: Prove result commit works
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Write commit probe result
        shell: bash
        run: |
          mkdir -p results/commit_probe
          {
            echo "# CodeDriftBench Commit Probe"
            echo ""
            echo "Run ID: $GITHUB_RUN_ID"
            echo "Commit: $GITHUB_SHA"
            echo "Generated: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo ""
            echo "This file proves GitHub Actions can commit generated benchmark artifacts back to the repository."
          } > results/commit_probe/latest.md

      - name: Commit probe result
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add results/commit_probe/latest.md
          if git diff --cached --quiet; then
            echo "No commit-probe changes."
          else
            git commit -m "Add CodeDriftBench commit probe $GITHUB_RUN_ID [skip ci]"
            git push
          fi

  dispatch-short:
    name: Dispatch short real benchmark
    needs: commit-probe
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch short CodeDriftBench run
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          WORKFLOW_FILE: codedriftbench-convergence.yml
        shell: bash
        run: |
          set -euo pipefail
          curl -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/actions/workflows/${WORKFLOW_FILE}/dispatches" \
            -d '{"ref":"main","inputs":{"evidence_profile":"smoke","models":"baseline:do_nothing,qwen2.5-coder:0.5b","horizons":"5","seeds":"1","context_strategies":"active_constraints","task_families":"todo_cli"}}'

      - name: Explain dispatched run
        shell: bash
        run: |
          echo "Dispatched codedriftbench-convergence.yml with a short real smoke run."
          echo "Expected output path after completion: results/smoke/latest/."
          echo "This short run is designed to prove execution and result commits before larger runs."
