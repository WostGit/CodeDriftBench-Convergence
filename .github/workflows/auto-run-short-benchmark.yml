name: Auto-run Short CodeDriftBench

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/codedriftbench-convergence.yml"
      - ".github/workflows/auto-run-short-benchmark.yml"

permissions:
  actions: write
  contents: read

concurrency:
  group: auto-run-codedriftbench-short-${{ github.ref }}
  cancel-in-progress: false

jobs:
  dispatch-short:
    name: Dispatch short real benchmark
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch short CodeDriftBench run
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          WORKFLOW_FILE: codedriftbench-convergence.yml
        shell: bash
        run: |
          set -euo pipefail
          curl -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/actions/workflows/${WORKFLOW_FILE}/dispatches" \
            -d '{"ref":"main","inputs":{"evidence_profile":"smoke","models":"baseline:do_nothing,qwen2.5-coder:0.5b","horizons":"5","seeds":"1","context_strategies":"active_constraints","task_families":"todo_cli"}}'

      - name: Explain dispatched run
        shell: bash
        run: |
          echo "Dispatched codedriftbench-convergence.yml with a short real smoke run."
          echo "Expected output path after completion: results/smoke/latest/."
          echo "This short run is designed to prove execution and result commits before larger runs."
