name: Auto-run CodeDriftBench Core

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/codedriftbench-convergence.yml"
      - ".github/workflows/auto-run-core-benchmark.yml"

permissions:
  actions: write
  contents: read

concurrency:
  group: auto-run-codedriftbench-core-${{ github.ref }}
  cancel-in-progress: false

jobs:
  dispatch-core:
    name: Dispatch core real benchmark
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch CodeDriftBench core run
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          WORKFLOW_FILE: codedriftbench-convergence.yml
        shell: bash
        run: |
          set -euo pipefail
          curl -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/actions/workflows/${WORKFLOW_FILE}/dispatches" \
            -d '{"ref":"main","inputs":{"evidence_profile":"core"}}'

      - name: Explain dispatched run
        shell: bash
        run: |
          echo "Dispatched codedriftbench-convergence.yml with evidence_profile=core."
          echo "Expected output path after completion: results/core/latest/."
