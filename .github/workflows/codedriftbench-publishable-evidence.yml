name: CodeDriftBench Publishable Evidence

on:
  workflow_dispatch:
    inputs:
      evidence_profile:
        description: "smoke, core, or paper"
        required: true
        default: "core"
      max_parallel:
        description: "Maximum parallel slice jobs"
        required: false
        default: "12"
      model_timeout_seconds:
        description: "Hard timeout per model edit"
        required: false
        default: "75"
  push:
    branches: [main]
    paths:
      - ".github/workflows/codedriftbench-publishable-evidence.yml"

permissions:
  contents: write
  actions: read

env:
  OLLAMA_HOST: http://127.0.0.1:11434
  PYTHONUNBUFFERED: "1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: codedriftbench-publishable-${{ github.ref }}-${{ github.event.inputs.evidence_profile || 'core' }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      expected_slices: ${{ steps.matrix.outputs.expected_slices }}
      expected_observations: ${{ steps.matrix.outputs.expected_observations }}
      profile: ${{ steps.matrix.outputs.profile }}
    steps:
      - id: matrix
        shell: python
        run: |
          import itertools, json, os, re
          profile = "${{ github.event.inputs.evidence_profile || 'core' }}"
          if profile == 'smoke':
              models=['baseline:copy','qwen2.5-coder:1.5b']; seeds=[1]; tasks=['todo_tags','todo_done_filter']; strategies=['no_anchor']; horizons=[1,3,5]
          elif profile == 'core':
              models=['baseline:copy','qwen2.5-coder:1.5b','qwen2.5-coder:3b']; seeds=[1,2,3]; tasks=['todo_tags','todo_done_filter','redactor_aws','config_timeout']; strategies=['no_anchor','active_constraints']; horizons=[5,10,20]
          elif profile == 'paper':
              models=['baseline:copy','qwen2.5-coder:0.5b','qwen2.5-coder:1.5b','qwen2.5-coder:3b','qwen2.5-coder:7b','deepseek-coder:1.3b']; seeds=[1,2,3,4,5]; tasks=['todo_tags','todo_done_filter','redactor_aws','config_timeout','combined_regression']; strategies=['no_anchor','active_constraints','repeated_spec']; horizons=[5,10,20,40]
          else:
              raise SystemExit(f'unknown profile: {profile}')
          def safe(x): return re.sub(r'[^A-Za-z0-9_.-]+','_',str(x)).strip('_')
          include=[]
          for idx,(model,seed,task,strategy) in enumerate(itertools.product(models,seeds,tasks,strategies)):
              include.append({'model':model,'seed':seed,'task':task,'strategy':strategy,'horizons':','.join(map(str,horizons)),'artifact_id':f'{idx:04d}-{safe(model)}-seed{seed}-{safe(task)}-{safe(strategy)}'})
          with open(os.environ['GITHUB_OUTPUT'],'a') as f:
              f.write('matrix='+json.dumps({'include':include})+'\n')
              f.write(f'expected_slices={len(include)}\n')
              f.write(f'expected_observations={len(include)*len(horizons)}\n')
              f.write(f'profile={profile}\n')
          print(json.dumps({'profile':profile,'slices':len(include),'observations':len(include)*len(horizons)},indent=2))

  slice:
    name: ${{ matrix.model }} seed=${{ matrix.seed }} task=${{ matrix.task }} strategy=${{ matrix.strategy }}
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJSON(github.event.inputs.max_parallel || '12') }}
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Ollama for non-baseline models
        if: ${{ !startsWith(matrix.model, 'baseline:') }}
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve > ollama.log 2>&1 &
          for i in $(seq 1 30); do curl -fsS "$OLLAMA_HOST/api/tags" >/dev/null 2>&1 && exit 0 || sleep 1; done
          cat ollama.log || true; exit 1
      - name: Pull model
        if: ${{ !startsWith(matrix.model, 'baseline:') }}
        shell: bash
        run: ollama pull "${{ matrix.model }}"
      - name: Run longitudinal executable slice
        shell: python
        env:
          MODEL: ${{ matrix.model }}
          SEED: ${{ matrix.seed }}
          TASK: ${{ matrix.task }}
          STRATEGY: ${{ matrix.strategy }}
          HORIZONS: ${{ matrix.horizons }}
          MODEL_TIMEOUT: ${{ github.event.inputs.model_timeout_seconds || '75' }}
        run: |
          import ast, importlib.util, json, os, re, tempfile, textwrap, time, traceback, urllib.request
          from pathlib import Path
          MODEL=os.environ['MODEL']; SEED=int(os.environ['SEED']); TASK=os.environ['TASK']; STRATEGY=os.environ['STRATEGY']; HORIZONS=[int(x) for x in os.environ['HORIZONS'].split(',') if x]
          MODEL_TIMEOUT=int(os.environ.get('MODEL_TIMEOUT','75')); OLLAMA_HOST=os.environ.get('OLLAMA_HOST','http://127.0.0.1:11434')
          outdir=Path('slice_result'); outdir.mkdir(exist_ok=True)
          BASE_CODE=textwrap.dedent('''
          import json, re
          def add_item(items, text):
              item = {"id": len(items) + 1, "text": text, "done": False}
              items.append(item)
              return item
          def list_items(items):
              return items
          def redact(text, label="<REDACTED>"):
              text = re.sub(r"(?i)(token|secret)=([A-Za-z0-9_-]{6,})", lambda m: m.group(1)+"="+label, text)
              return re.sub(r"[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}", "<EMAIL>", text)
          def parse_config(text):
              data = json.loads(text) if text.strip() else {}
              out = {"debug": False, "retries": 3, "timeout": 30}
              out.update(data)
              return out
          ''').strip()+"\n"
          REQUESTS={
            'todo_tags':['Add optional tags to add_item while preserving old callers and list_items.','Add tag filtering to list_items(items, tag=None) while preserving list_items(items).','Ensure tags are JSON-serializable lists and default to an empty list.'],
            'todo_done_filter':['Add list_items(items, done=True/False) filtering while preserving list_items(items).','Add mark_done(items, item_id) without breaking add_item.','Keep list_items(items) returning every item by default.'],
            'redactor_aws':['Also redact AWS access-key-like strings beginning with AKIA, without leaking secrets.','Add configurable replacement label while preserving the default label behavior.','Ensure email, token, secret, and AWS keys are all redacted together.'],
            'config_timeout':['Validate that timeout must be positive while preserving parse_config(text).','Add retries validation: retries must be a non-negative integer.','Preserve defaults for missing debug, retries, and timeout.'],
            'combined_regression':['Add optional tags to add_item and preserve old callers.','Add list_items(items, done=True/False) filtering while preserving list_items(items).','Redact AWS access keys and preserve existing token, secret, and email redaction.','Validate timeout must be positive and preserve parse_config defaults.']}
          DURABLE='Preserve old APIs and behavior: add_item(items,text), list_items(items), redact email/token/secret, parse_config defaults; standard library only; no network calls.'
          def prompt_for(code, request, step):
              reminder='' if STRATEGY=='no_anchor' else '\n'+DURABLE
              if STRATEGY=='repeated_spec': reminder='\nRepeat the durable constraints before coding. '+DURABLE
              return f'Return ONLY a complete Python code block. Step {step} request: {request}{reminder}\nCurrent file:\n```python\n{code}\n```'
          def strip_control(s):
              s=re.sub(r'\x1b\[[0-?]*[ -/]*[@-~]','',s); return ''.join(ch for ch in s if ch in '\n\r\t' or ord(ch)>=32)
          def extract_python(s):
              s=strip_control(s); blocks=re.findall(r'```(?:python)?\s*(.*?)```',s,flags=re.S|re.I); return (blocks[-1] if blocks else s).strip()+"\n"
          def call_model(prompt, code):
              if MODEL.startswith('baseline:'): return code
              payload={'model':MODEL,'prompt':prompt,'stream':False,'options':{'temperature':0,'top_p':1,'seed':SEED,'num_ctx':4096}}
              req=urllib.request.Request(f'{OLLAMA_HOST}/api/generate',data=json.dumps(payload).encode(),headers={'Content-Type':'application/json'})
              with urllib.request.urlopen(req,timeout=MODEL_TIMEOUT) as resp: return json.loads(resp.read().decode()).get('response','')
          def evaluate(code, active_reqs):
              hygiene={}; legacy={}; feature={}; failures=[]
              def ck(bucket,name,cond,detail=''):
                  bucket[name]=bool(cond)
                  if not cond: failures.append({'check':name,'detail':str(detail)[:500]})
              ck(hygiene,'returned_code',bool(code.strip())); ck(hygiene,'no_control_chars',code==strip_control(code))
              try: ast.parse(code); ck(hygiene,'ast_parse',True)
              except Exception as e: ck(hygiene,'ast_parse',False,repr(e))
              try: tree=ast.parse(code)
              except Exception: tree=None
              imports=set(); banned={'requests','urllib','httpx','aiohttp','socket','subprocess'}
              if tree:
                  for n in ast.walk(tree):
                      if isinstance(n,ast.Import): imports|={a.name.split('.')[0] for a in n.names}
                      if isinstance(n,ast.ImportFrom) and n.module: imports.add(n.module.split('.')[0])
              ck(hygiene,'no_network_or_process_imports',not(imports&banned),imports&banned)
              with tempfile.TemporaryDirectory() as d:
                  p=Path(d)/'candidate.py'; p.write_text(code); spec=importlib.util.spec_from_file_location('candidate',p); mod=importlib.util.module_from_spec(spec)
                  try: spec.loader.exec_module(mod); ck(hygiene,'module_imports',True)
                  except Exception: ck(hygiene,'module_imports',False,traceback.format_exc()); mod=None
                  if mod:
                      for fn in ['add_item','list_items','redact','parse_config']: ck(legacy,f'api_{fn}_exists',callable(getattr(mod,fn,None)))
                      try: items=[]; item=mod.add_item(items,'milk'); ck(legacy,'add_item_mutates',len(items)==1 and item is items[0] and item.get('id')==1,items)
                      except Exception: ck(legacy,'add_item_mutates',False,traceback.format_exc())
                      try: items=[{'id':1,'text':'x','done':False},{'id':2,'text':'y','done':True}]; ck(legacy,'list_items_default_all',mod.list_items(items)==items,mod.list_items(items))
                      except Exception: ck(legacy,'list_items_default_all',False,traceback.format_exc())
                      try: red=mod.redact('a@test.com token=abcdefg secret=hijklmn'); ck(legacy,'redact_legacy_secrets','<EMAIL>' in red and 'a@test.com' not in red and 'abcdefg' not in red and 'hijklmn' not in red,red)
                      except Exception: ck(legacy,'redact_legacy_secrets',False,traceback.format_exc())
                      try: cfg=mod.parse_config('{}'); ck(legacy,'parse_config_defaults',cfg.get('debug') is False and cfg.get('retries')==3 and cfg.get('timeout')==30,cfg)
                      except Exception: ck(legacy,'parse_config_defaults',False,traceback.format_exc())
                      req=' '.join(active_reqs)
                      if 'tags' in req:
                          try: items=[]; x=mod.add_item(items,'milk',tags=['home']); ck(feature,'tags_add','home' in x.get('tags',[]),x); y=mod.add_item(items,'bread'); ck(feature,'tags_old_caller',len(items)==2 and y.get('text')=='bread',y)
                          except Exception: ck(feature,'tags_add',False,traceback.format_exc()); ck(feature,'tags_old_caller',False)
                      if 'tag filtering' in req:
                          try: items=[{'id':1,'text':'a','done':False,'tags':['home']},{'id':2,'text':'b','done':False,'tags':['work']}]; ck(feature,'tag_filter',[i['id'] for i in mod.list_items(items,tag='home')]==[1],mod.list_items(items,tag='home'))
                          except Exception: ck(feature,'tag_filter',False,traceback.format_exc())
                      if 'done=True/False' in req or 'mark_done' in req or 'returning every item' in req:
                          try: items=[{'id':1,'text':'a','done':True},{'id':2,'text':'b','done':False}]; ck(feature,'done_filter',[i['id'] for i in mod.list_items(items,done=True)]==[1] and [i['id'] for i in mod.list_items(items,done=False)]==[2]); ck(feature,'done_default_all',mod.list_items(items)==items,mod.list_items(items))
                          except Exception: ck(feature,'done_filter',False,traceback.format_exc()); ck(feature,'done_default_all',False)
                      if 'mark_done' in req:
                          try: items=[{'id':1,'text':'a','done':False}]; mod.mark_done(items,1); ck(feature,'mark_done',items[0]['done'] is True,items)
                          except Exception: ck(feature,'mark_done',False,traceback.format_exc())
                      if 'AWS' in req:
                          try: red=mod.redact('AKIAABCDEFGHIJKLMNOP token=abcdefg a@test.com'); ck(feature,'redact_aws','AKIAABCDEFGHIJKLMNOP' not in red and 'abcdefg' not in red and 'a@test.com' not in red,red)
                          except Exception: ck(feature,'redact_aws',False,traceback.format_exc())
                      if 'timeout' in req:
                          try: ck(feature,'timeout_positive',mod.parse_config('{"timeout": 10}').get('timeout')==10)
                          except Exception: ck(feature,'timeout_positive',False,traceback.format_exc())
                          try: mod.parse_config('{"timeout": 0}'); ck(feature,'timeout_reject_zero',False,'accepted')
                          except ValueError: ck(feature,'timeout_reject_zero',True)
                          except Exception: ck(feature,'timeout_reject_zero',False,traceback.format_exc())
                      if 'retries' in req:
                          try: ck(feature,'retries_nonnegative',mod.parse_config('{"retries": 0}').get('retries')==0)
                          except Exception: ck(feature,'retries_nonnegative',False,traceback.format_exc())
                          try: mod.parse_config('{"retries": -1}'); ck(feature,'retries_reject_negative',False,'accepted')
                          except ValueError: ck(feature,'retries_reject_negative',True)
                          except Exception: ck(feature,'retries_reject_negative',False,traceback.format_exc())
              def avg(d): return sum(d.values())/len(d) if d else 1.0
              legacy_score=avg(legacy); feature_score=avg(feature); hygiene_score=avg(hygiene)
              spec_score=0.25*hygiene_score+0.35*legacy_score+0.40*feature_score
              silent_spec_failure=legacy_score>=0.90 and feature_score<0.50
              all_checks={f'hygiene_{k}':v for k,v in hygiene.items()}|{f'legacy_{k}':v for k,v in legacy.items()}|{f'feature_{k}':v for k,v in feature.items()}
              return all_checks,failures,legacy_score,feature_score,hygiene_score,spec_score,silent_spec_failure
          requests=REQUESTS[TASK]; code=BASE_CODE; active=[]; observations=[]; next_req=0; started=time.time(); max_h=max(HORIZONS)
          for step in range(1,max_h+1):
              if next_req<len(requests) and (step==1 or step%max(2,max_h//len(requests))==0): active.append(requests[next_req]); next_req+=1
              try: code=extract_python(call_model(prompt_for(code,active[-1],step),code))
              except Exception: pass
              if step in HORIZONS:
                  checks,failures,legacy_score,feature_score,hygiene_score,spec_score,ssfr=evaluate(code,active)
                  observations.append({'horizon':step,'legacy_score':legacy_score,'feature_score':feature_score,'hygiene_score':hygiene_score,'spec_score':spec_score,'silent_spec_failure':ssfr,'checks':checks,'failures':failures[:12],'active_requirements':list(active),'code_tail':code[-1200:]})
          result={'model':MODEL,'seed':SEED,'task':TASK,'strategy':STRATEGY,'horizons':HORIZONS,'duration_seconds':int(time.time()-started),'observations':observations,'final_spec_score':observations[-1]['spec_score'] if observations else 0,'final_feature_score':observations[-1]['feature_score'] if observations else 0}
          safe_model=re.sub(r'[^A-Za-z0-9_.-]+','_',MODEL).strip('_'); (outdir/f'{safe_model}__seed{SEED}__{TASK}__{STRATEGY}.json').write_text(json.dumps(result,indent=2),encoding='utf-8')
          print(json.dumps({'final_spec_score':result['final_spec_score'],'final_feature_score':result['final_feature_score']},indent=2))
      - uses: actions/upload-artifact@v4
        with:
          name: slice-${{ matrix.artifact_id }}
          path: slice_result/*.json
          if-no-files-found: error

  aggregate:
    needs: [prepare, slice]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - uses: actions/download-artifact@v4
        with:
          path: all_slices
          pattern: slice-*
      - name: Aggregate evidence
        shell: python
        env:
          PROFILE: ${{ needs.prepare.outputs.profile }}
          EXPECTED_SLICES: ${{ needs.prepare.outputs.expected_slices }}
          EXPECTED_OBSERVATIONS: ${{ needs.prepare.outputs.expected_observations }}
        run: |
          import csv,json,math,os,random,statistics,time
          from collections import defaultdict
          from pathlib import Path
          profile=os.environ['PROFILE']; run_id=os.environ.get('GITHUB_RUN_ID','local'); expected_slices=int(os.environ['EXPECTED_SLICES']); expected_obs=int(os.environ['EXPECTED_OBSERVATIONS'])
          rows=[]; slices=[]; examples=[]
          for p in sorted(Path('all_slices').rglob('*.json')):
              s=json.loads(p.read_text()); slices.append(s)
              for o in s.get('observations',[]):
                  row={'model':s['model'],'seed':s['seed'],'task':s['task'],'strategy':s['strategy'],'horizon':o['horizon'],'legacy_score':o['legacy_score'],'feature_score':o['feature_score'],'hygiene_score':o['hygiene_score'],'spec_score':o['spec_score'],'silent_spec_failure':o['silent_spec_failure'],'strict_feature_pass':o['feature_score']>=0.999,'legacy_regression':o['legacy_score']<0.999,'failure_count':len(o.get('failures',[]))}
                  rows.append(row)
                  if o.get('failures') and len(examples)<12:
                      examples.append({**row,'failures':o.get('failures',[])[:5],'active_requirements':o.get('active_requirements',[]),'code_tail':o.get('code_tail','')[-800:]})
          def mean(xs): return statistics.mean(xs) if xs else float('nan')
          def ci95(xs,n=800):
              xs=[x for x in xs if not math.isnan(x)]
              if len(xs)<2: return [mean(xs),mean(xs)]
              rng=random.Random(0); vals=[mean([rng.choice(xs) for __ in xs]) for _ in range(n)]; vals.sort(); return [vals[int(.025*n)],vals[int(.975*n)]]
          def summarize(key,metric):
              d=defaultdict(list)
              for r in rows: d[r[key]].append(float(r[metric]))
              return {str(k):{'n':len(v),'mean':mean(v),'ci95':ci95(v)} for k,v in sorted(d.items(),key=lambda x:str(x[0]))}
          def summarize_bool(key,metric):
              d=defaultdict(list)
              for r in rows: d[r[key]].append(1.0 if r[metric] else 0.0)
              return {str(k):{'n':len(v),'rate':mean(v),'ci95':ci95(v)} for k,v in sorted(d.items(),key=lambda x:str(x[0]))}
          # Baseline-adjusted feature lift for every observation using same seed/task/strategy/horizon.
          baseline_by_key={(r['seed'],r['task'],r['strategy'],r['horizon']):r['feature_score'] for r in rows if r['model'].startswith('baseline:')}
          for r in rows:
              r['baseline_matched_feature_score']=baseline_by_key.get((r['seed'],r['task'],r['strategy'],r['horizon']),float('nan'))
              r['baseline_adjusted_feature_lift']=r['feature_score']-r['baseline_matched_feature_score'] if not math.isnan(r['baseline_matched_feature_score']) else float('nan')
          baseline_rows=[r for r in rows if r['model'].startswith('baseline:')]; nonbaseline_rows=[r for r in rows if not r['model'].startswith('baseline:')]
          baseline_feature=[r['feature_score'] for r in baseline_rows]; nonbaseline_feature=[r['feature_score'] for r in nonbaseline_rows]
          nonbaseline_lift=[r['baseline_adjusted_feature_lift'] for r in nonbaseline_rows if not math.isnan(r['baseline_adjusted_feature_lift'])]
          feature_delta=mean(nonbaseline_feature)-mean(baseline_feature) if baseline_feature and nonbaseline_feature else float('nan')
          baseline_contam_tasks=sorted({r['task'] for r in baseline_rows if r['feature_score']>0.0})
          result={
            'benchmark':'CodeDriftBench-PublishableEvidence','profile':profile,'run_id':run_id,
            'expected_slices':expected_slices,'observed_slices':len(slices),'expected_observations':expected_obs,'observed_observations':len(rows),
            'mean_legacy_score':mean([r['legacy_score'] for r in rows]),'mean_feature_score':mean([r['feature_score'] for r in rows]),'mean_spec_score':mean([r['spec_score'] for r in rows]),
            'mean_silent_spec_failure_rate':mean([1.0 if r['silent_spec_failure'] else 0.0 for r in rows]),
            'strict_feature_pass_rate':mean([1.0 if r['strict_feature_pass'] else 0.0 for r in rows]),'legacy_regression_rate':mean([1.0 if r['legacy_regression'] else 0.0 for r in rows]),
            'baseline_feature_mean':mean(baseline_feature),'nonbaseline_feature_mean':mean(nonbaseline_feature),'feature_delta_over_baseline':feature_delta,
            'mean_baseline_adjusted_feature_lift':mean(nonbaseline_lift),'baseline_adjusted_feature_lift_ci95':ci95(nonbaseline_lift),
            'baseline_feature_contamination_tasks':baseline_contam_tasks,'baseline_feature_contamination_rate':mean([1.0 if r['feature_score']>0 else 0.0 for r in baseline_rows]),
            'spec_ci95':ci95([r['spec_score'] for r in rows]),'feature_ci95':ci95([r['feature_score'] for r in rows]),
            'model_spec_summary':summarize('model','spec_score'),'model_feature_summary':summarize('model','feature_score'),'model_ssfr_summary':summarize_bool('model','silent_spec_failure'),
            'model_strict_feature_pass_summary':summarize_bool('model','strict_feature_pass'),'model_legacy_regression_summary':summarize_bool('model','legacy_regression'),
            'task_feature_summary':summarize('task','feature_score'),'task_spec_summary':summarize('task','spec_score'),'task_ssfr_summary':summarize_bool('task','silent_spec_failure'),
            'strategy_spec_summary':summarize('strategy','spec_score'),'strategy_feature_summary':summarize('strategy','feature_score'),'strategy_ssfr_summary':summarize_bool('strategy','silent_spec_failure'),
            'model_strategy_feature_summary':summarize('model','feature_score')
          }
          # Richer model x strategy table.
          ms=defaultdict(list)
          for r in rows: ms[(r['model'],r['strategy'])].append(r['feature_score'])
          result['model_strategy_feature_summary']={f'{m} | {s}':{'n':len(v),'mean':mean(v),'ci95':ci95(v)} for (m,s),v in sorted(ms.items())}
          current_gates={'complete_run':len(slices)==expected_slices and len(rows)==expected_obs,'has_baseline':bool(baseline_rows),'enough_nonbaseline_models':len({s['model'] for s in slices if not s['model'].startswith('baseline:')})>=2,'enough_tasks':len({s['task'] for s in slices})>=4,'enough_seeds':len({s['seed'] for s in slices})>=3,'enough_horizons':len({r['horizon'] for r in rows})>=3,'strategy_ablation':len({s['strategy'] for s in slices})>=2,'executable_scoring':True,'reports_uncertainty':True,'feature_signal_over_baseline':feature_delta>=0.05,'baseline_adjusted_lift_positive':mean(nonbaseline_lift)>=0.05,'enough_observations':len(rows)>=200,'separate_metrics_reported':True,'model_ssfr_reported':True,'task_summary_reported':True,'strict_feature_pass_reported':True,'legacy_regression_reported':True,'baseline_contamination_audited':True}
          paper_gates={**current_gates,'paper_profile':profile=='paper','paper_model_diversity':len({s['model'] for s in slices if not s['model'].startswith('baseline:')})>=4,'paper_task_count':len({s['task'] for s in slices})>=5,'paper_seed_count':len({s['seed'] for s in slices})>=5,'paper_strategy_count':len({s['strategy'] for s in slices})>=3,'paper_observation_count':len(rows)>=1000,'baseline_contamination_below_20pct':result['baseline_feature_contamination_rate']<=0.20}
          result['core_evidence_package']=all(current_gates.values())
          result['paper_grade_evidence']=all(paper_gates.values())
          result['gates']=current_gates; result['paper_grade_gates']=paper_gates
          if result['paper_grade_evidence']:
              result['claim_card']='Paper-grade evidence package: passed scale, diversity, separated-metric, baseline-adjusted, and audit gates.'
          elif result['core_evidence_package']:
              result['claim_card']='Core evidence package: passed reproducibility, separated-metric, baseline-adjusted, and signal gates. Paper-grade evidence still requires the paper profile and diversity gates.'
          else:
              result['claim_card']='Not publishable yet; see failed gates.'
          base=Path('results/publishable_evidence')/profile; latest=base/'latest'; run_dir=base/'runs'/run_id
          for d in (latest,run_dir): d.mkdir(parents=True,exist_ok=True)
          for d in (latest,run_dir):
              (d/'report.json').write_text(json.dumps(result,indent=2),encoding='utf-8')
              (d/'failure_examples.json').write_text(json.dumps(examples,indent=2),encoding='utf-8')
              with (d/'observations.csv').open('w',newline='') as f:
                  w=csv.DictWriter(f,fieldnames=list(rows[0].keys()) if rows else ['model']); w.writeheader(); w.writerows(rows)
          lines=['# CodeDriftBench Publishable Evidence Report','',f'Profile: `{profile}`',f'Run ID: `{run_id}`',f'Observed slices: **{len(slices)}/{expected_slices}**',f'Observed observations: **{len(rows)}/{expected_obs}**',f'Mean legacy score: **{result["mean_legacy_score"]:.3f}**',f'Mean feature score: **{result["mean_feature_score"]:.3f}**',f'Mean spec score: **{result["mean_spec_score"]:.3f}**',f'Silent spec failure rate: **{result["mean_silent_spec_failure_rate"]:.3f}**',f'Strict feature pass rate: **{result["strict_feature_pass_rate"]:.3f}**',f'Legacy regression rate: **{result["legacy_regression_rate"]:.3f}**',f'Baseline feature mean: **{result["baseline_feature_mean"]:.3f}**',f'Nonbaseline feature mean: **{result["nonbaseline_feature_mean"]:.3f}**',f'Feature delta over baseline: **{result["feature_delta_over_baseline"]:.3f}**',f'Mean baseline-adjusted feature lift: **{result["mean_baseline_adjusted_feature_lift"]:.3f}**',f'Baseline contamination rate: **{result["baseline_feature_contamination_rate"]:.3f}**',f'Core evidence package: **{result["core_evidence_package"]}**',f'Paper-grade evidence: **{result["paper_grade_evidence"]}**','','## Core gates','| Gate | Status |','|---|---:|']
          for k,v in current_gates.items(): lines.append(f'| {k} | {"PASS" if v else "FAIL"} |')
          lines += ['','## Paper-grade gates','| Gate | Status |','|---|---:|']
          for k,v in paper_gates.items(): lines.append(f'| {k} | {"PASS" if v else "FAIL"} |')
          lines += ['','## Model feature / SSFR summary','| Model | Feature mean | Strict pass | SSFR | Legacy regression |','|---|---:|---:|---:|---:|']
          for m,s in result['model_feature_summary'].items(): lines.append(f'| {m} | {s["mean"]:.3f} | {result["model_strict_feature_pass_summary"][m]["rate"]:.3f} | {result["model_ssfr_summary"][m]["rate"]:.3f} | {result["model_legacy_regression_summary"][m]["rate"]:.3f} |')
          lines += ['','## Task summary','| Task | Feature mean | Spec mean | SSFR |','|---|---:|---:|---:|']
          for t,s in result['task_feature_summary'].items(): lines.append(f'| {t} | {s["mean"]:.3f} | {result["task_spec_summary"][t]["mean"]:.3f} | {result["task_ssfr_summary"][t]["rate"]:.3f} |')
          lines += ['','## Model x strategy feature summary','| Model | Strategy | Feature mean | CI95 |','|---|---|---:|---|']
          for key,s in result['model_strategy_feature_summary'].items():
              m,st=key.split(' | ',1); lines.append(f'| {m} | {st} | {s["mean"]:.3f} | [{s["ci95"][0]:.3f}, {s["ci95"][1]:.3f}] |')
          lines += ['','## Baseline contamination audit',f'Baseline feature contamination tasks: `{", ".join(baseline_contam_tasks) if baseline_contam_tasks else "none"}`','', '## Claim card',result['claim_card'],'','This report separates legacy, feature, hygiene, and spec scores; reports strict pass rates, regression rates, SSFR by model/task/strategy, baseline-adjusted feature lift, and baseline contamination.']
          for d in (latest,run_dir): (d/'report.md').write_text('\n'.join(lines)+'\n',encoding='utf-8')
          print('\n'.join(lines))
      - name: Commit reports
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          cp -R results/publishable_evidence /tmp/publishable_evidence
          git reset --hard HEAD
          git pull --rebase origin main
          rm -rf results/publishable_evidence
          mkdir -p results
          cp -R /tmp/publishable_evidence results/publishable_evidence
          git add results/publishable_evidence
          git diff --cached --quiet || { git commit -m "Add hardened CodeDriftBench evidence report $GITHUB_RUN_ID [skip ci]"; git push; }
