      - name: Commit reports
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -d results/publishable_evidence ]; then
            cp -R results/publishable_evidence /tmp/publishable_evidence
          else
            mkdir -p /tmp/publishable_evidence/${{ needs.prepare.outputs.profile || 'unknown' }}/latest
            printf '# CodeDriftBench aggregate failed before report generation\n' > /tmp/publishable_evidence/${{ needs.prepare.outputs.profile || 'unknown' }}/latest/report.md
          fi
          git reset --hard HEAD
          git pull --rebase origin main
          rm -rf results/publishable_evidence
          mkdir -p results
          cp -R /tmp/publishable_evidence results/publishable_evidence
          git add results/publishable_evidence
          git diff --cached --quiet || { git commit -m "Harden CodeDriftBench convergence evidence workflow $GITHUB_RUN_ID [skip ci]"; git push; }
