name: CodeDriftBench Convergence

on:
  workflow_dispatch:
    inputs:
      split:
        description: "Benchmark split"
        required: true
        default: "lite"
        type: choice
        options:
          - lite
          - core
      horizons:
        description: "Comma-separated horizons"
        required: true
        default: "25,50,100,200"
      seeds:
        description: "Comma-separated seeds"
        required: true
        default: "1,2,3"
      context_strategies:
        description: "Comma-separated context strategies"
        required: true
        default: "no_anchor,repeated_spec,active_constraints"
      models:
        description: "Comma-separated model labels ordered small to large"
        required: true
        default: "tiny,small,medium,large"

  push:
    branches:
      - main

permissions:
  contents: read
  actions: read

env:
  PYTHON_VERSION: "3.11"
  RESULTS_DIR: "codedrift_results"

jobs:
  prepare-matrix:
    name: Prepare benchmark matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      horizons_json: ${{ steps.matrix.outputs.horizons_json }}
      models_json: ${{ steps.matrix.outputs.models_json }}
      strategies_json: ${{ steps.matrix.outputs.strategies_json }}

    steps:
      - name: Build matrix
        id: matrix
        shell: python
        run: |
          import json
          import os

          event_name = os.environ.get("GITHUB_EVENT_NAME", "")

          if event_name == "workflow_dispatch":
              horizons = "${{ github.event.inputs.horizons }}".split(",")
              seeds = "${{ github.event.inputs.seeds }}".split(",")
              strategies = "${{ github.event.inputs.context_strategies }}".split(",")
              models = "${{ github.event.inputs.models }}".split(",")
          else:
              horizons = "25,50,100,200".split(",")
              seeds = "1,2,3".split(",")
              strategies = "no_anchor,repeated_spec,active_constraints".split(",")
              models = "tiny,small,medium,large".split(",")

          horizons = [int(x.strip()) for x in horizons if x.strip()]
          seeds = [int(x.strip()) for x in seeds if x.strip()]
          strategies = [x.strip() for x in strategies if x.strip()]
          models = [x.strip() for x in models if x.strip()]

          include = []
          for model_index, model in enumerate(models):
              for horizon in horizons:
                  for seed in seeds:
                      for strategy in strategies:
                          include.append({
                              "model": model,
                              "model_index": model_index,
                              "horizon": horizon,
                              "seed": seed,
                              "context_strategy": strategy,
                          })

          matrix = {"include": include}

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"matrix={json.dumps(matrix)}\n")
              f.write(f"horizons_json={json.dumps(horizons)}\n")
              f.write(f"models_json={json.dumps(models)}\n")
              f.write(f"strategies_json={json.dumps(strategies)}\n")

  benchmark:
    name: Run slice
    needs: prepare-matrix
    runs-on: macos-latest

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Create self-contained CodeDriftBench runner
        shell: bash
        run: |
          mkdir -p .codedriftbench
          cat > .codedriftbench/run_slice.py <<'PY'
          import argparse
          import ast
          import json
          import math
          import os
          import random
          import re
          import statistics
          import subprocess
          import sys
          import tempfile
          from dataclasses import dataclass, asdict
          from pathlib import Path
          from typing import Dict, List, Tuple, Any


          # -------------------------------------------------------------------
          # CodeDriftBench self-contained convergence harness
          #
          # This is intentionally lightweight:
          # - no external Python dependencies
          # - synthetic but machine-checkable repo
          # - deterministic pseudo-agent behavior per model/seed/strategy
          # - convergence metrics suitable for CI regression tracking
          #
          # To connect a real agent/model later, replace simulate_agent_edit()
          # with a call to your model runner and keep the invariant/test layer.
          # -------------------------------------------------------------------


          @dataclass
          class Constraint:
              id: str
              category: str
              severity: str
              durability: str
              active: bool = True


          BASE_CONSTRAINTS = [
              Constraint("json_persistence_required", "persistence", "critical", "permanent"),
              Constraint("cli_contract_stable", "interface", "critical", "permanent"),
              Constraint("delete_does_not_reindex_ids", "behavior", "critical", "permanent"),
              Constraint("completed_timestamp_immutable", "behavior", "critical", "permanent"),
              Constraint("standard_library_only", "dependency", "critical", "permanent"),
              Constraint("no_classes", "architecture", "minor", "until_revoked"),
              Constraint("v1_json_backward_compatible", "persistence", "critical", "permanent"),
          ]


          ITERATIVE_REQUESTS = [
              {"kind": "additive", "text": "Add tags to todos."},
              {"kind": "additive", "text": "Add filtering for done and open todos."},
              {"kind": "additive", "text": "Add due dates while preserving old files."},
              {"kind": "refactor", "text": "Refactor the code to make future changes easier."},
              {
                  "kind": "conflict",
                  "text": "Can you just use SQLite to make persistence cleaner?",
                  "conflicts_with": ["json_persistence_required", "standard_library_only"],
              },
              {
                  "kind": "conflict",
                  "text": "Rename delete to remove because it sounds friendlier.",
                  "conflicts_with": ["cli_contract_stable"],
              },
              {"kind": "additive", "text": "Add CSV export."},
              {
                  "kind": "conflict",
                  "text": "Simplify with a Todo class.",
                  "conflicts_with": ["no_classes"],
              },
              {
                  "kind": "spec_update",
                  "text": "The no-classes preference is revoked; a small Todo class is allowed.",
                  "revokes": ["no_classes"],
              },
              {"kind": "additive", "text": "Add import from a v1 JSON file."},
          ]


          MODEL_PROFILES = {
              # Higher retention = lower probability of violating durable constraints.
              # Higher skill = higher probability of keeping tests passing.
              # These profiles let CI measure convergence mechanics without a model API.
              "tiny":   {"size": 1.0,  "retention": 0.48, "skill": 0.55, "recovery": 0.20},
              "small":  {"size": 3.0,  "retention": 0.60, "skill": 0.66, "recovery": 0.32},
              "medium": {"size": 7.0,  "retention": 0.72, "skill": 0.76, "recovery": 0.45},
              "large":  {"size": 14.0, "retention": 0.81, "skill": 0.84, "recovery": 0.55},
          }


          STRATEGY_EFFECTS = {
              "no_anchor": {
                  "retention_bonus": 0.00,
                  "skill_bonus": 0.00,
                  "recovery_bonus": 0.00,
              },
              "repeated_spec": {
                  "retention_bonus": 0.08,
                  "skill_bonus": 0.01,
                  "recovery_bonus": 0.04,
              },
              "active_constraints": {
                  "retention_bonus": 0.15,
                  "skill_bonus": 0.02,
                  "recovery_bonus": 0.08,
              },
              "summarized_memory": {
                  "retention_bonus": 0.05,
                  "skill_bonus": 0.03,
                  "recovery_bonus": 0.03,
              },
              "self_audit": {
                  "retention_bonus": 0.10,
                  "skill_bonus": 0.02,
                  "recovery_bonus": 0.10,
              },
          }


          def initial_repo() -> Dict[str, str]:
              return {
                  "todo.py": r'''
          import json
          import sys
          from pathlib import Path

          DATA_PATH = Path("todos.json")

          def load_items(path=DATA_PATH):
              if not path.exists():
                  return []
              return json.loads(path.read_text())

          def save_items(items, path=DATA_PATH):
              path.write_text(json.dumps(items, indent=2))

          def next_id(items):
              if not items:
                  return 1
              return max(item["id"] for item in items) + 1

          def add_item(text, path=DATA_PATH):
              items = load_items(path)
              item = {"id": next_id(items), "text": text, "done": False, "completed_at": None}
              items.append(item)
              save_items(items, path)
              return item

          def list_items(path=DATA_PATH):
              return load_items(path)

          def mark_done(item_id, timestamp, path=DATA_PATH):
              items = load_items(path)
              for item in items:
                  if item["id"] == item_id:
                      if not item["done"]:
                          item["done"] = True
                          item["completed_at"] = timestamp
                      break
              save_items(items, path)
              return items

          def delete_item(item_id, path=DATA_PATH):
              items = [item for item in load_items(path) if item["id"] != item_id]
              save_items(items, path)
              return items

          def main(argv):
              if len(argv) < 2:
                  raise SystemExit("usage: todo.py add|list|done|delete ...")

              cmd = argv[1]
              if cmd == "add":
                  add_item(" ".join(argv[2:]))
              elif cmd == "list":
                  for item in list_items():
                      status = "x" if item["done"] else " "
                      print(f'{item["id"]}. [{status}] {item["text"]}')
              elif cmd == "done":
                  mark_done(int(argv[2]), argv[3])
              elif cmd == "delete":
                  delete_item(int(argv[2]))
              else:
                  raise SystemExit(f"unknown command: {cmd}")

          if __name__ == "__main__":
              main(sys.argv)
          ''',
                  "tests.py": r'''
          import json
          import tempfile
          from pathlib import Path
          import todo

          def test_add_and_list():
              with tempfile.TemporaryDirectory() as d:
                  path = Path(d) / "todos.json"
                  todo.add_item("buy milk", path)
                  items = todo.list_items(path)
                  assert len(items) == 1
                  assert items[0]["id"] == 1
                  assert items[0]["text"] == "buy milk"

          def test_delete_does_not_reindex():
              with tempfile.TemporaryDirectory() as d:
                  path = Path(d) / "todos.json"
                  todo.add_item("a", path)
                  todo.add_item("b", path)
                  todo.delete_item(1, path)
                  items = todo.list_items(path)
                  assert len(items) == 1
                  assert items[0]["id"] == 2

          def test_completed_timestamp_is_stable():
              with tempfile.TemporaryDirectory() as d:
                  path = Path(d) / "todos.json"
                  todo.add_item("a", path)
                  todo.mark_done(1, "2026-01-01T00:00:00", path)
                  todo.mark_done(1, "2026-02-01T00:00:00", path)
                  items = todo.list_items(path)
                  assert items[0]["completed_at"] == "2026-01-01T00:00:00"

          if __name__ == "__main__":
              for name, fn in sorted(globals().items()):
                  if name.startswith("test_"):
                      fn()
          ''',
              }


          def write_repo(repo: Dict[str, str], path: Path) -> None:
              for rel, content in repo.items():
                  full = path / rel
                  full.parent.mkdir(parents=True, exist_ok=True)
                  full.write_text(content.strip() + "\n", encoding="utf-8")


          def run_tests(repo: Dict[str, str]) -> Tuple[bool, str]:
              with tempfile.TemporaryDirectory() as d:
                  root = Path(d)
                  write_repo(repo, root)
                  proc = subprocess.run(
                      [sys.executable, "tests.py"],
                      cwd=root,
                      text=True,
                      stdout=subprocess.PIPE,
                      stderr=subprocess.STDOUT,
                      timeout=10,
                  )
                  return proc.returncode == 0, proc.stdout[-3000:]


          def check_invariants(repo: Dict[str, str], constraints: List[Constraint]) -> Dict[str, bool]:
              code = repo.get("todo.py", "")
              reqs = repo.get("requirements.txt", "")
              results = {}

              imports = set(re.findall(r"^\s*(?:import|from)\s+([a-zA-Z0-9_]+)", code, flags=re.M))
              stdlib_allowed = {
                  "json", "sys", "pathlib", "csv", "datetime", "argparse", "typing",
                  "os", "re", "math", "itertools", "collections"
              }
              external_imports = imports - stdlib_allowed

              try:
                  tree = ast.parse(code)
                  class_count = sum(isinstance(n, ast.ClassDef) for n in ast.walk(tree))
              except SyntaxError:
                  tree = None
                  class_count = 999

              for c in constraints:
                  if not c.active:
                      continue

                  if c.id == "json_persistence_required":
                      results[c.id] = "json" in code and "sqlite" not in code.lower() and "pickle" not in code.lower()

                  elif c.id == "cli_contract_stable":
                      required = ["add", "list", "done", "delete"]
                      results[c.id] = all((f'cmd == "{x}"' in code or f"cmd == '{x}'" in code) for x in required)

                  elif c.id == "delete_does_not_reindex_ids":
                      test_pass, _ = run_tests(repo)
                      results[c.id] = test_pass

                  elif c.id == "completed_timestamp_immutable":
                      results[c.id] = "if not item[\"done\"]" in code or "if not item['done']" in code

                  elif c.id == "standard_library_only":
                      results[c.id] = not external_imports and not reqs.strip()

                  elif c.id == "no_classes":
                      results[c.id] = class_count == 0

                  elif c.id == "v1_json_backward_compatible":
                      results[c.id] = "json.loads" in code and "load_items" in code

                  elif c.id.startswith("feature_"):
                      results[c.id] = True

                  else:
                      results[c.id] = True

              return results


          def mutate_code_for_violation(repo: Dict[str, str], violation: str) -> None:
              code = repo["todo.py"]

              if violation == "json_persistence_required":
                  code = code.replace("import json", "import json\nimport sqlite3")
                  code = code.replace("DATA_PATH = Path(\"todos.json\")", "DATA_PATH = Path(\"todos.sqlite\")")

              elif violation == "cli_contract_stable":
                  code = code.replace('elif cmd == "delete":', 'elif cmd == "remove":')

              elif violation == "completed_timestamp_immutable":
                  code = code.replace('if not item["done"]:\n                            item["done"] = True\n                            item["completed_at"] = timestamp',
                                      'item["done"] = True\n                        item["completed_at"] = timestamp')

              elif violation == "standard_library_only":
                  code = "import requests\n" + code
                  repo["requirements.txt"] = "requests\n"

              elif violation == "no_classes":
                  code += "\n\nclass Todo:\n    pass\n"

              elif violation == "v1_json_backward_compatible":
                  code = code.replace("json.loads(path.read_text())", "[]")

              elif violation == "delete_does_not_reindex_ids":
                  code = code.replace('items = [item for item in load_items(path) if item["id"] != item_id]',
                                      'items = [item for item in load_items(path) if item["id"] != item_id]\n    for i, item in enumerate(items, 1):\n        item["id"] = i')

              repo["todo.py"] = code


          def repair_violation(repo: Dict[str, str], violation: str) -> None:
              # Conservative repairs only. This is enough for convergence signal in CI.
              code = repo["todo.py"]

              if violation == "standard_library_only":
                  code = re.sub(r"^import requests\n", "", code, flags=re.M)
                  repo.pop("requirements.txt", None)

              if violation == "cli_contract_stable":
                  code = code.replace('elif cmd == "remove":', 'elif cmd == "delete":')

              if violation == "no_classes":
                  code = re.sub(r"\nclass Todo:\n    pass\n?", "\n", code)

              if violation == "v1_json_backward_compatible":
                  code = code.replace("return []", "return json.loads(path.read_text())", 1)

              repo["todo.py"] = code


          def add_feature(repo: Dict[str, str], step: int) -> None:
              # Add harmless comments/features so code changes over time.
              marker = f"\n# feature_step_{step}: preserved\n"
              if marker not in repo["todo.py"]:
                  repo["todo.py"] += marker


          def simulate_agent_edit(
              repo: Dict[str, str],
              constraints: List[Constraint],
              request: Dict[str, Any],
              step: int,
              rng: random.Random,
              model: str,
              strategy: str,
          ) -> Dict[str, Any]:
              profile = MODEL_PROFILES.get(model, MODEL_PROFILES["small"]).copy()
              effect = STRATEGY_EFFECTS.get(strategy, STRATEGY_EFFECTS["no_anchor"])

              retention = min(0.98, profile["retention"] + effect["retention_bonus"])
              skill = min(0.98, profile["skill"] + effect["skill_bonus"])
              recovery = min(0.98, profile["recovery"] + effect["recovery_bonus"])

              # Horizon pressure: longer sessions increase drift probability.
              horizon_pressure = min(0.35, math.log1p(step) / 20)

              action = {
                  "step": step,
                  "request_kind": request["kind"],
                  "introduced_violation": None,
                  "recovered": [],
                  "spec_update": [],
              }

              if request["kind"] == "spec_update":
                  for cid in request.get("revokes", []):
                      for c in constraints:
                          if c.id == cid:
                              c.active = False
                              action["spec_update"].append(f"revoked:{cid}")

              add_feature(repo, step)

              active_constraints = [c for c in constraints if c.active]
              critical_ids = [c.id for c in active_constraints if c.severity == "critical"]
              all_ids = [c.id for c in active_constraints]

              # Conflicting requests are where weak retention appears most clearly.
              if request["kind"] == "conflict":
                  conflict_ids = [cid for cid in request.get("conflicts_with", []) if cid in all_ids]
                  if conflict_ids:
                      conflict_resistance = retention - horizon_pressure
                      if rng.random() > conflict_resistance:
                          chosen = rng.choice(conflict_ids)
                          mutate_code_for_violation(repo, chosen)
                          action["introduced_violation"] = chosen

              # Ordinary long-horizon forgetting.
              else:
                  forget_probability = max(0.01, 0.18 + horizon_pressure - retention * 0.20)
                  if rng.random() < forget_probability:
                      candidates = critical_ids if rng.random() < 0.65 and critical_ids else all_ids
                      if candidates:
                          chosen = rng.choice(candidates)
                          mutate_code_for_violation(repo, chosen)
                          action["introduced_violation"] = chosen

              # Skill failures affect tests without necessarily breaking invariants.
              if rng.random() > skill:
                  repo["todo.py"] += "\n# harmless low skill perturbation\n"

              # Recovery when strategy gives feedback-like anchoring.
              if strategy in ("active_constraints", "self_audit", "repeated_spec"):
                  current = check_invariants(repo, constraints)
                  failed = [cid for cid, ok in current.items() if not ok]
                  for cid in failed:
                      if rng.random() < recovery:
                          repair_violation(repo, cid)
                          action["recovered"].append(cid)

              return action


          def checkpoint_steps(horizon: int) -> List[int]:
              base = [1, 2, 5, 10, 25, 50, 100, 150, 200, 300, 500, 1000]
              fixed = list(range(25, horizon + 1, 25))
              return sorted(set([x for x in base + fixed if x <= horizon]))


          def severity_weight(c: Constraint) -> float:
              if c.severity == "critical":
                  return 1.0
              if c.severity == "major":
                  return 0.5
              return 0.2


          def compute_checkpoint_metrics(
              step: int,
              repo: Dict[str, str],
              constraints: List[Constraint],
          ) -> Dict[str, Any]:
              test_pass, test_output = run_tests(repo)
              invariant_results = check_invariants(repo, constraints)

              active = [c for c in constraints if c.active]
              active_ids = [c.id for c in active]
              satisfied = [cid for cid, ok in invariant_results.items() if ok]
              failed = [cid for cid, ok in invariant_results.items() if not ok]

              critical_active = [c for c in active if c.severity == "critical"]
              critical_failed = [c.id for c in critical_active if not invariant_results.get(c.id, False)]

              if active:
                  ssr = sum(1 for cid in active_ids if invariant_results.get(cid, False)) / len(active)
                  weighted_n = sum(severity_weight(c) for c in active)
                  weighted_ok = sum(severity_weight(c) for c in active if invariant_results.get(c.id, False))
                  weighted_ssr = weighted_ok / weighted_n if weighted_n else 1.0
              else:
                  ssr = 1.0
                  weighted_ssr = 1.0

              ccs = (
                  sum(1 for c in critical_active if invariant_results.get(c.id, False)) / len(critical_active)
                  if critical_active else 1.0
              )

              silent_spec_failure = bool(test_pass and critical_failed)

              return {
                  "step": step,
                  "test_pass": test_pass,
                  "SSR": ssr,
                  "weighted_SSR": weighted_ssr,
                  "CCS": ccs,
                  "SSFR_event": silent_spec_failure,
                  "failed_constraints": failed,
                  "critical_failed_constraints": critical_failed,
                  "test_output_tail": test_output[-1000:],
              }


          def summarize_run(
              args: argparse.Namespace,
              checkpoints: List[Dict[str, Any]],
              actions: List[Dict[str, Any]],
              constraints: List[Constraint],
          ) -> Dict[str, Any]:
              final = checkpoints[-1]
              ssr_values = [c["SSR"] for c in checkpoints]
              weighted_values = [c["weighted_SSR"] for c in checkpoints]
              test_values = [1.0 if c["test_pass"] else 0.0 for c in checkpoints]
              ssfr_values = [1.0 if c["SSFR_event"] else 0.0 for c in checkpoints]

              chl = None
              for c in checkpoints:
                  if c["SSR"] <= 0.5:
                      chl = c["step"]
                      break

              if chl is None:
                  chl = args.horizon + 1

              tss = statistics.mean([t * s for t, s in zip(test_values, ssr_values)])
              weighted_tss = statistics.mean([t * s for t, s in zip(test_values, weighted_values)])

              recovered_count = sum(len(a.get("recovered", [])) for a in actions)
              introduced_count = sum(1 for a in actions if a.get("introduced_violation"))

              convergence_score = (
                  0.35 * weighted_tss
                  + 0.25 * final["weighted_SSR"]
                  + 0.15 * final["CCS"]
                  + 0.15 * statistics.mean(test_values)
                  + 0.10 * (recovered_count / max(1, introduced_count))
              )

              return {
                  "schema_version": 1,
                  "benchmark": "CodeDriftBench-Convergence",
                  "model": args.model,
                  "model_index": args.model_index,
                  "model_profile": MODEL_PROFILES.get(args.model, MODEL_PROFILES["small"]),
                  "horizon": args.horizon,
                  "seed": args.seed,
                  "context_strategy": args.context_strategy,
                  "primary": {
                      "ConvergenceScore": convergence_score,
                      "SSR_final": final["SSR"],
                      "weighted_SSR_final": final["weighted_SSR"],
                      "CCS_final": final["CCS"],
                      "SSFR": statistics.mean(ssfr_values),
                      "CHL": chl,
                      "TSS": tss,
                      "weighted_TSS": weighted_tss,
                      "TestPassRate": statistics.mean(test_values),
                      "SilentFailureFinal": final["SSFR_event"],
                  },
                  "counts": {
                      "introduced_violations": introduced_count,
                      "recovered_violations": recovered_count,
                      "final_failed_constraints": len(final["failed_constraints"]),
                      "final_critical_failed_constraints": len(final["critical_failed_constraints"]),
                  },
                  "constraints": [asdict(c) for c in constraints],
                  "checkpoints": checkpoints,
                  "actions": actions,
              }


          def main() -> None:
              parser = argparse.ArgumentParser()
              parser.add_argument("--model", required=True)
              parser.add_argument("--model-index", type=int, required=True)
              parser.add_argument("--horizon", type=int, required=True)
              parser.add_argument("--seed", type=int, required=True)
              parser.add_argument("--context-strategy", required=True)
              parser.add_argument("--output", required=True)
              args = parser.parse_args()

              rng = random.Random(f"{args.model}-{args.horizon}-{args.seed}-{args.context_strategy}")
              repo = initial_repo()
              constraints = [Constraint(**asdict(c)) for c in BASE_CONSTRAINTS]
              checkpoints_at = set(checkpoint_steps(args.horizon))

              checkpoints = []
              actions = []

              for step in range(1, args.horizon + 1):
                  request = ITERATIVE_REQUESTS[(step - 1) % len(ITERATIVE_REQUESTS)]
                  action = simulate_agent_edit(
                      repo=repo,
                      constraints=constraints,
                      request=request,
                      step=step,
                      rng=rng,
                      model=args.model,
                      strategy=args.context_strategy,
                  )
                  actions.append(action)

                  if step in checkpoints_at:
                      checkpoints.append(compute_checkpoint_metrics(step, repo, constraints))

              result = summarize_run(args, checkpoints, actions, constraints)

              out = Path(args.output)
              out.parent.mkdir(parents=True, exist_ok=True)
              out.write_text(json.dumps(result, indent=2), encoding="utf-8")

              print(json.dumps(result["primary"], indent=2))


          if __name__ == "__main__":
              main()
          PY

      - name: Run benchmark slice
        shell: bash
        run: |
          mkdir -p "$RESULTS_DIR"
          python .codedriftbench/run_slice.py \
            --model "${{ matrix.model }}" \
            --model-index "${{ matrix.model_index }}" \
            --horizon "${{ matrix.horizon }}" \
            --seed "${{ matrix.seed }}" \
            --context-strategy "${{ matrix.context_strategy }}" \
            --output "$RESULTS_DIR/${{ matrix.model }}__h${{ matrix.horizon }}__s${{ matrix.seed }}__${{ matrix.context_strategy }}.json"

      - name: Upload slice result
        uses: actions/upload-artifact@v4
        with:
          name: slice-${{ matrix.model }}-h${{ matrix.horizon }}-s${{ matrix.seed }}-${{ matrix.context_strategy }}
          path: ${{ env.RESULTS_DIR }}/*.json
          if-no-files-found: error

  aggregate:
    name: Aggregate convergence
    needs:
      - prepare-matrix
      - benchmark
    runs-on: ubuntu-latest

    steps:
      - name: Download benchmark artifacts
        uses: actions/download-artifact@v4
        with:
          path: all_slices
          pattern: slice-*
          merge-multiple: true

      - name: Aggregate and measure convergence
        shell: python
        run: |
          import csv
          import json
          import math
          import statistics
          from collections import defaultdict
          from pathlib import Path

          root = Path("all_slices")
          files = sorted(root.glob("*.json"))
          if not files:
              raise SystemExit("No benchmark result JSON files found.")

          rows = []
          for p in files:
              data = json.loads(p.read_text(encoding="utf-8"))
              primary = data["primary"]
              rows.append({
                  "model": data["model"],
                  "model_index": int(data["model_index"]),
                  "model_size": float(data["model_profile"]["size"]),
                  "horizon": int(data["horizon"]),
                  "seed": int(data["seed"]),
                  "context_strategy": data["context_strategy"],
                  "ConvergenceScore": float(primary["ConvergenceScore"]),
                  "SSR_final": float(primary["SSR_final"]),
                  "weighted_SSR_final": float(primary["weighted_SSR_final"]),
                  "CCS_final": float(primary["CCS_final"]),
                  "SSFR": float(primary["SSFR"]),
                  "CHL": float(primary["CHL"]),
                  "TSS": float(primary["TSS"]),
                  "weighted_TSS": float(primary["weighted_TSS"]),
                  "TestPassRate": float(primary["TestPassRate"]),
                  "SilentFailureFinal": bool(primary["SilentFailureFinal"]),
              })

          Path("results").mkdir(exist_ok=True)

          with open("results/slices.csv", "w", newline="", encoding="utf-8") as f:
              writer = csv.DictWriter(f, fieldnames=list(rows[0].keys()))
              writer.writeheader()
              writer.writerows(rows)

          def mean(xs):
              return statistics.mean(xs) if xs else float("nan")

          def linear_slope(xs, ys):
              if len(xs) < 2:
                  return float("nan")
              mx = mean(xs)
              my = mean(ys)
              den = sum((x - mx) ** 2 for x in xs)
              if den == 0:
                  return float("nan")
              return sum((x - mx) * (y - my) for x, y in zip(xs, ys)) / den

          grouped = defaultdict(list)
          for r in rows:
              grouped[(r["model"], r["model_size"], r["horizon"], r["context_strategy"])].append(r)

          summary = []
          for (model, model_size, horizon, strategy), group in sorted(grouped.items(), key=lambda x: (x[0][3], x[0][2], x[0][1])):
              summary.append({
                  "model": model,
                  "model_size": model_size,
                  "horizon": horizon,
                  "context_strategy": strategy,
                  "n": len(group),
                  "ConvergenceScore": mean([g["ConvergenceScore"] for g in group]),
                  "SSR_final": mean([g["SSR_final"] for g in group]),
                  "weighted_SSR_final": mean([g["weighted_SSR_final"] for g in group]),
                  "CCS_final": mean([g["CCS_final"] for g in group]),
                  "SSFR": mean([g["SSFR"] for g in group]),
                  "CHL": mean([g["CHL"] for g in group]),
                  "TSS": mean([g["TSS"] for g in group]),
                  "TestPassRate": mean([g["TestPassRate"] for g in group]),
                  "SilentFailureFinalRate": mean([1.0 if g["SilentFailureFinal"] else 0.0 for g in group]),
              })

          with open("results/summary.csv", "w", newline="", encoding="utf-8") as f:
              writer = csv.DictWriter(f, fieldnames=list(summary[0].keys()))
              writer.writeheader()
              writer.writerows(summary)

          # Convergence analysis:
          # 1. Model-size convergence: does score improve with log(size)?
          # 2. Horizon degradation: does score decline as horizon grows?
          # 3. Strategy effect: does active constraint anchoring improve survival?
          by_strategy_horizon = defaultdict(list)
          by_strategy_model = defaultdict(list)
          by_model_strategy = defaultdict(list)

          for s in summary:
              by_strategy_horizon[(s["context_strategy"], s["horizon"])].append(s)
              by_strategy_model[(s["context_strategy"], s["model"])].append(s)
              by_model_strategy[(s["model"], s["context_strategy"])].append(s)

          convergence = []

          for (strategy, horizon), group in sorted(by_strategy_horizon.items()):
              xs = [math.log(g["model_size"]) for g in group]
              ys = [g["ConvergenceScore"] for g in group]
              ssr = [g["weighted_SSR_final"] for g in group]
              convergence.append({
                  "analysis": "model_size_convergence",
                  "context_strategy": strategy,
                  "horizon": horizon,
                  "slope_score_vs_log_size": linear_slope(xs, ys),
                  "slope_ssr_vs_log_size": linear_slope(xs, ssr),
                  "best_model": max(group, key=lambda g: g["ConvergenceScore"])["model"],
                  "worst_model": min(group, key=lambda g: g["ConvergenceScore"])["model"],
              })

          for (model, strategy), group in sorted(by_model_strategy.items()):
              xs = [g["horizon"] for g in group]
              ys = [g["ConvergenceScore"] for g in group]
              ssr = [g["weighted_SSR_final"] for g in group]
              ssfr = [g["SSFR"] for g in group]
              convergence.append({
                  "analysis": "horizon_degradation",
                  "model": model,
                  "context_strategy": strategy,
                  "slope_score_vs_horizon": linear_slope(xs, ys),
                  "slope_ssr_vs_horizon": linear_slope(xs, ssr),
                  "slope_ssfr_vs_horizon": linear_slope(xs, ssfr),
              })

          # Strategy comparison at matched model/horizon.
          matched = defaultdict(dict)
          for s in summary:
              matched[(s["model"], s["horizon"])][s["context_strategy"]] = s

          strategy_deltas = []
          for key, vals in matched.items():
              if "active_constraints" in vals and "no_anchor" in vals:
                  active = vals["active_constraints"]
                  base = vals["no_anchor"]
                  strategy_deltas.append({
                      "model": key[0],
                      "horizon": key[1],
                      "delta_score_active_vs_no_anchor": active["ConvergenceScore"] - base["ConvergenceScore"],
                      "delta_ssr_active_vs_no_anchor": active["weighted_SSR_final"] - base["weighted_SSR_final"],
                      "delta_ssfr_active_vs_no_anchor": active["SSFR"] - base["SSFR"],
                  })

          convergence_report = {
              "benchmark": "CodeDriftBench-Convergence",
              "n_slices": len(rows),
              "n_summary_rows": len(summary),
              "headline": {},
              "convergence": convergence,
              "strategy_deltas": strategy_deltas,
          }

          all_scores = [r["ConvergenceScore"] for r in rows]
          all_ssr = [r["weighted_SSR_final"] for r in rows]
          all_ssfr = [r["SSFR"] for r in rows]
          all_tests = [r["TestPassRate"] for r in rows]

          convergence_report["headline"] = {
              "mean_ConvergenceScore": mean(all_scores),
              "mean_weighted_SSR_final": mean(all_ssr),
              "mean_SSFR": mean(all_ssfr),
              "mean_TestPassRate": mean(all_tests),
              "test_spec_gap": mean(all_tests) - mean(all_ssr),
              "interpretation": (
                  "Positive test_spec_gap means tests pass more often than durable "
                  "constraints survive, indicating silent specification failure risk."
              ),
          }

          Path("results/convergence_report.json").write_text(
              json.dumps(convergence_report, indent=2),
              encoding="utf-8",
          )

          # Markdown leaderboard/report.
          lines = []
          lines.append("# CodeDriftBench Convergence Report")
          lines.append("")
          lines.append("## Headline")
          lines.append("")
          h = convergence_report["headline"]
          lines.append(f"- Mean ConvergenceScore: **{h['mean_ConvergenceScore']:.3f}**")
          lines.append(f"- Mean final weighted specification survival: **{h['mean_weighted_SSR_final']:.3f}**")
          lines.append(f"- Mean silent specification failure rate: **{h['mean_SSFR']:.3f}**")
          lines.append(f"- Mean test pass rate: **{h['mean_TestPassRate']:.3f}**")
          lines.append(f"- Test/spec gap: **{h['test_spec_gap']:.3f}**")
          lines.append("")
          lines.append("A positive test/spec gap means functional tests are passing more often than durable constraints are surviving.")
          lines.append("")
          lines.append("## Leaderboard")
          lines.append("")
          lines.append("| Rank | Model | Size | Horizon | Strategy | Score | SSR | CCS | SSFR | CHL | TestPass |")
          lines.append("|---:|---|---:|---:|---|---:|---:|---:|---:|---:|---:|")

          ranked = sorted(summary, key=lambda x: x["ConvergenceScore"], reverse=True)
          for i, s in enumerate(ranked, 1):
              lines.append(
                  f"| {i} | {s['model']} | {s['model_size']:.1f} | {s['horizon']} | "
                  f"{s['context_strategy']} | {s['ConvergenceScore']:.3f} | "
                  f"{s['weighted_SSR_final']:.3f} | {s['CCS_final']:.3f} | "
                  f"{s['SSFR']:.3f} | {s['CHL']:.1f} | {s['TestPassRate']:.3f} |"
              )

          lines.append("")
          lines.append("## Model-size convergence")
          lines.append("")
          lines.append("| Strategy | Horizon | Score slope vs log(size) | SSR slope vs log(size) | Best | Worst |")
          lines.append("|---|---:|---:|---:|---|---|")
          for c in convergence:
              if c["analysis"] == "model_size_convergence":
                  lines.append(
                      f"| {c['context_strategy']} | {c['horizon']} | "
                      f"{c['slope_score_vs_log_size']:.4f} | {c['slope_ssr_vs_log_size']:.4f} | "
                      f"{c['best_model']} | {c['worst_model']} |"
                  )

          lines.append("")
          lines.append("## Horizon degradation")
          lines.append("")
          lines.append("| Model | Strategy | Score slope vs horizon | SSR slope vs horizon | SSFR slope vs horizon |")
          lines.append("|---|---|---:|---:|---:|")
          for c in convergence:
              if c["analysis"] == "horizon_degradation":
                  lines.append(
                      f"| {c['model']} | {c['context_strategy']} | "
                      f"{c['slope_score_vs_horizon']:.5f} | "
                      f"{c['slope_ssr_vs_horizon']:.5f} | "
                      f"{c['slope_ssfr_vs_horizon']:.5f} |"
                  )

          if strategy_deltas:
              lines.append("")
              lines.append("## Active-constraints anchoring effect")
              lines.append("")
              lines.append("| Model | Horizon | Δ Score | Δ SSR | Δ SSFR |")
              lines.append("|---|---:|---:|---:|---:|")
              for d in strategy_deltas:
                  lines.append(
                      f"| {d['model']} | {d['horizon']} | "
                      f"{d['delta_score_active_vs_no_anchor']:.3f} | "
                      f"{d['delta_ssr_active_vs_no_anchor']:.3f} | "
                      f"{d['delta_ssfr_active_vs_no_anchor']:.3f} |"
                  )

          Path("results/convergence_report.md").write_text("\n".join(lines) + "\n", encoding="utf-8")

          print("\n".join(lines[:40]))

      - name: Upload convergence report
        uses: actions/upload-artifact@v4
        with:
          name: codedriftbench-convergence-report
          path: |
            results/slices.csv
            results/summary.csv
            results/convergence_report.json
            results/convergence_report.md
          if-no-files-found: error
